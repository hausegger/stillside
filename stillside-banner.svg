<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 300" width="1100" height="300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>

    <!-- Moon lit side gradient -->
    <radialGradient id="moonLight" cx="0.35" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#e8e4d8"/>
      <stop offset="40%" stop-color="#d4cfc0"/>
      <stop offset="100%" stop-color="#b8b3a4"/>
    </radialGradient>

    <!-- CRT phosphor glow -->
    <radialGradient id="crtGlow" cx="0.45" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#2a6a2a" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#1a4a1a" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#0a250a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#18401a" opacity="0.9"/>
      <rect y="2" width="4" height="2" fill="#030803" opacity="0.8"/>
    </pattern>

    <!-- CRT screen curvature highlight -->
    <radialGradient id="screenReflection" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Moon shadow for depth -->
    <filter id="moonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for the CRT side -->
    <filter id="crtEdgeGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clipping for dark side of moon -->
    <clipPath id="stillSideClip">
      <path d="M 420,150 A 95,95 0 0 1 420,55 A 95,95 0 0 1 420,245 Z" />
    </clipPath>

    <!-- Clipping for lit side of moon -->
    <clipPath id="litSideClip">
      <path d="M 420,150 A 95,95 0 0 0 420,55 A 95,95 0 0 0 420,245 Z" />
    </clipPath>

    <!-- Full moon clip -->
    <clipPath id="moonClip">
      <circle cx="420" cy="150" r="94"/>
    </clipPath>

    <!-- Star twinkle filter -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="300" fill="url(#bg)"/>

  <!-- Subtle stars -->
  <g opacity="0.4">
    <circle cx="80" cy="45" r="1" fill="#ffffff"/>
    <circle cx="150" cy="120" r="0.8" fill="#ffffff"/>
    <circle cx="200" cy="70" r="1.2" fill="#ffffff"/>
    <circle cx="280" cy="200" r="0.7" fill="#ffffff"/>
    <circle cx="120" cy="230" r="1" fill="#ffffff"/>
    <circle cx="700" cy="50" r="0.8" fill="#ffffff"/>
    <circle cx="780" cy="180" r="1" fill="#ffffff"/>
    <circle cx="850" cy="90" r="0.7" fill="#ffffff"/>
    <circle cx="950" cy="220" r="1.1" fill="#ffffff"/>
    <circle cx="1020" cy="60" r="0.9" fill="#ffffff"/>
    <circle cx="1060" cy="140" r="0.6" fill="#ffffff"/>
    <circle cx="330" cy="80" r="0.8" fill="#ffffff"/>
    <circle cx="180" cy="170" r="0.5" fill="#ffffff"/>
    <circle cx="900" cy="250" r="0.8" fill="#ffffff"/>
    <circle cx="750" cy="120" r="0.6" fill="#ffffff"/>
  </g>

  <!-- Brighter stars with glow -->
  <g filter="url(#starGlow)" opacity="0.3">
    <circle cx="100" cy="80" r="1.5" fill="#ffffff"/>
    <circle cx="300" cy="40" r="1.8" fill="#ffffff"/>
    <circle cx="680" cy="70" r="1.5" fill="#ffffff"/>
    <circle cx="1000" cy="160" r="1.5" fill="#ffffff"/>
  </g>

  <!-- Moon with shadow -->
  <g filter="url(#moonShadow)">
    <!-- Lit side of moon -->
    <g clip-path="url(#litSideClip)">
      <circle cx="420" cy="150" r="94" fill="url(#moonLight)"/>
      <!-- Moon surface texture - subtle craters -->
      <circle cx="385" cy="120" r="12" fill="#c4bfb0" opacity="0.3"/>
      <circle cx="400" cy="170" r="8" fill="#c4bfb0" opacity="0.25"/>
      <circle cx="370" cy="190" r="6" fill="#c8c3b4" opacity="0.2"/>
      <circle cx="395" cy="100" r="5" fill="#bfb9aa" opacity="0.2"/>
      <circle cx="360" cy="145" r="9" fill="#c0baa8" opacity="0.15"/>
    </g>

    <!-- Dark side of moon - CRT effect -->
    <g clip-path="url(#stillSideClip)">
      <!-- Dark base -->
      <circle cx="420" cy="150" r="94" fill="#050808"/>

      <!-- CRT phosphor glow -->
      <circle cx="445" cy="145" r="80" fill="url(#crtGlow)"/>

      <!-- Scanlines over dark side -->
      <g clip-path="url(#moonClip)">
        <rect x="420" y="56" width="100" height="190" fill="url(#scanlines)" opacity="0.7"/>
      </g>

      <!-- CRT horizontal scan line - bright active scanline -->
      <g filter="url(#crtEdgeGlow)">
        <line x1="422" y1="148" x2="510" y2="148" stroke="#3a8a3a" stroke-width="1.5" opacity="0.8"/>
        <line x1="422" y1="149" x2="508" y2="149" stroke="#50aa50" stroke-width="0.5" opacity="0.5"/>
      </g>

      <!-- Phosphor pixel dots -->
      <g opacity="0.5">
        <circle cx="435" cy="110" r="1.2" fill="#2a7a2a"/>
        <circle cx="450" cy="118" r="1.0" fill="#3a8a3a"/>
        <circle cx="462" cy="128" r="1.1" fill="#2a6a2a"/>
        <circle cx="440" cy="135" r="0.9" fill="#3a9a3a"/>
        <circle cx="455" cy="142" r="1.0" fill="#2a7a2a"/>
        <circle cx="445" cy="160" r="1.2" fill="#3a8a3a"/>
        <circle cx="458" cy="168" r="0.8" fill="#2a6a2a"/>
        <circle cx="435" cy="178" r="1.1" fill="#2a7a2a"/>
        <circle cx="465" cy="138" r="0.7" fill="#3a8a3a"/>
        <circle cx="470" cy="155" r="0.9" fill="#2a6a2a"/>
        <circle cx="448" cy="190" r="0.8" fill="#2a7a2a"/>
        <circle cx="430" cy="98" r="0.9" fill="#2a6a2a"/>
        <circle cx="455" cy="100" r="0.7" fill="#1a5a1a"/>
        <circle cx="442" cy="200" r="0.7" fill="#1a5a1a"/>
      </g>

      <!-- Screen reflection on CRT side -->
      <circle cx="420" cy="150" r="94" fill="url(#screenReflection)"/>
    </g>

    <!-- Terminator line (boundary between lit and dark) -->
    <path d="M 420,56 L 420,244" stroke="#2a2a22" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- "STILLSIDE" text -->
  <g transform="translate(560, 138)">
    <!-- Subtle text shadow -->
    <text font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="52" font-weight="200" letter-spacing="14"
          fill="#ffffff" opacity="0.03" y="2" x="1">STILLSIDE</text>
    <!-- Main text -->
    <text font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="52" font-weight="200" letter-spacing="14"
          fill="#e0ddd4">STILLSIDE</text>
  </g>

  <!-- Tagline -->
  <text x="564" y="180"
        font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="300" letter-spacing="4"
        fill="#666660">BLACK OUT YOUR MONITOR</text>

  <!-- Subtle bottom edge fade -->
  <rect y="280" width="1100" height="20" fill="url(#bg)" opacity="0.5"/>
</svg>
